# OpenOCD config for N32G031 via CMSIS-DAP (SWD)
# Custom flash driver — Nations N32 uses 32-bit word programming
# FLASH registers at 0x40022000 (same layout as STM32F1/F0)

source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 1000

set CHIPNAME n32g031
source [find target/swj-dp.tcl]

swj_newdap $CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf
dap create $CHIPNAME.dap -chain-position $CHIPNAME.cpu

target create $CHIPNAME.cpu cortex_m -dap $CHIPNAME.dap
$CHIPNAME.cpu configure -work-area-phys 0x20000000 -work-area-size 0x1000 -work-area-backup 0

reset_config none separate

# ─── N32G031 flash programming procs ───

proc n32_wait_bsy {} {
    set timeout 100000
    while {$timeout > 0} {
        set sts [read_memory 0x4002200C 32 1]
        if {(([lindex $sts 0]) & 0x01) == 0} { return }
        incr timeout -1
    }
    error "FLASH BSY timeout"
}

proc n32_unlock {} {
    set ctrl [read_memory 0x40022010 32 1]
    if {(([lindex $ctrl 0]) & 0x80) == 0} { return }
    mww 0x40022004 0x45670123
    mww 0x40022004 0xCDEF89AB
}

proc n32_lock {} { mww 0x40022010 0x00000080 }

proc n32_mass_erase {} {
    n32_unlock
    mww 0x40022010 0x00000004
    mww 0x40022010 0x00000044
    n32_wait_bsy
    mww 0x40022010 0x00000000
    puts "N32: flash mass-erased"
}

proc n32_flash_bin { filename base } {
    n32_unlock
    set f [open $filename rb]
    fconfigure $f -translation binary
    set data [read $f]
    close $f
    set len [string length $data]
    puts "N32: programming $len bytes @ [format 0x%08x $base]"
    mww 0x40022010 0x00000001
    set addr $base
    set i 0
    while {$i < $len} {
        set b0 [scan [string index $data $i] %c]
        set b1 [expr {$i+1 < $len ? [scan [string index $data [expr $i+1]] %c] : 0xFF}]
        set b2 [expr {$i+2 < $len ? [scan [string index $data [expr $i+2]] %c] : 0xFF}]
        set b3 [expr {$i+3 < $len ? [scan [string index $data [expr $i+3]] %c] : 0xFF}]
        mww $addr [expr {($b3 << 24) | ($b2 << 16) | ($b1 << 8) | $b0}]
        n32_wait_bsy
        incr addr 4
        incr i 4
    }
    mww 0x40022010 0x00000000
    puts "N32: programmed $len bytes"
}

proc n32_program { binfile } {
    halt
    n32_mass_erase
    n32_flash_bin $binfile 0x08000000
    n32_lock
    reset run
}
